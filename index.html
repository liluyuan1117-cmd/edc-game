<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天真的压力山大 - EDC 解压游戏</title>
    <meta name="description" content="在线 EDC 解压玩具模拟器，指尖陀螺、按压泡泡，随时随地放松解压">
    <meta name="theme-color" content="#667eea">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>😤 今天真的压力山大</h1>
            <p class="subtitle">玩点 EDC 玩具，放松一下～</p>
        </header>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">总解压次数</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="stat-session">0</span>
                <span class="stat-label">本次会话</span>
            </div>
        </div>

        <!-- 玩具选择区 -->
        <nav class="toy-nav">
            <button class="toy-btn active" data-toy="spinner">
                <span class="emoji">🌀</span>指尖陀螺
            </button>
            <button class="toy-btn" data-toy="popit">
                <span class="emoji">🔘</span>按压泡泡
            </button>
            <button class="toy-btn" data-toy="keyboard" disabled>
                <span class="emoji">⌨️</span>机械键盘
            </button>
            <button class="toy-btn" data-toy="switch" disabled>
                <span class="emoji">🔧</span>无限开关
            </button>
            <button class="toy-btn" data-toy="squishy" disabled>
                <span class="emoji">🎱</span>捏捏乐
            </button>
        </nav>

        <!-- 游戏区域 -->
        <main class="game-area">
            <!-- 指尖陀螺 -->
            <div id="spinner" class="toy-container active">
                <div class="spinner-wrapper">
                    <div class="spinner" id="fidget-spinner">
                        <div class="spinner-center"></div>
                        <div class="spinner-arm arm-1"></div>
                        <div class="spinner-arm arm-2"></div>
                        <div class="spinner-arm arm-3"></div>
                    </div>
                </div>
                <p class="hint">点击或滑动旋转陀螺 🌀</p>
            </div>

            <!-- 按压泡泡 -->
            <div id="popit" class="toy-container">
                <div class="popit-board" id="popit-board"></div>
                <p class="hint">点击泡泡，听啵啵声～ 🔘</p>
                <button class="reset-btn" id="popit-reset">🔄 全部重置</button>
            </div>

            <!-- 其他玩具占位 -->
            <div id="keyboard" class="toy-container">
                <div class="toy-placeholder">
                    <div class="emoji">⌨️</div>
                    <p>机械键盘开发中...</p>
                    <small>青轴/红轴/茶轴音效即将上线</small>
                </div>
            </div>
            <div id="switch" class="toy-container">
                <div class="toy-placeholder">
                    <div class="emoji">🔧</div>
                    <p>无限开关开发中...</p>
                    <small>咔嗒咔嗒停不下来</small>
                </div>
            </div>
            <div id="squishy" class="toy-container">
                <div class="toy-placeholder">
                    <div class="emoji">🎱</div>
                    <p>捏捏乐开发中...</p>
                    <small>软糯 Q 弹超治愈</small>
                </div>
            </div>
        </main>

        <!-- 底部 -->
        <footer class="footer">
            <p>MVP 版本 | 更多玩具开发中...</p>
            <p style="margin-top: 10px; font-size: 0.8rem; opacity: 0.7;">
                Made with ❤️ for stressed humans everywhere
            </p>
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
