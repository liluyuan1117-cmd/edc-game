<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天真的压力山大 - EDC 解压游戏</title>
    <meta name="description" content="在线 EDC 解压玩具模拟器，指尖陀螺、按压泡泡，随时随地放松解压">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>😤 今天真的压力山大</h1>
            <p class="subtitle">玩点 EDC 玩具，放松一下～</p>
        </header>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">总解压次数</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="stat-session">0</span>
                <span class="stat-label">本次会话</span>
            </div>
        </div>

        <!-- 玩具选择区 -->
        <nav class="toy-nav">
            <button class="toy-btn active" data-toy="spinner">
                <span class="emoji">🌀</span>指尖陀螺
            </button>
            <button class="toy-btn" data-toy="popit">
                <span class="emoji">🔘</span>按压泡泡
            </button>
            <button class="toy-btn" data-toy="slider">
                <span class="emoji">🔲</span>磁力滑块
            </button>
            <button class="toy-btn" data-toy="infinity">
                <span class="emoji">🎲</span>无限魔方
            </button>
            <button class="toy-btn" data-toy="squishy">
                <span class="emoji">🔮</span>磁力捏捏球
            </button>
        </nav>

        <!-- EDC 玩具架 - 形态选择器 -->
        <div class="toy-shelf" id="toy-shelf">
            <div class="shelf-label">🏷️ 当前玩具形态</div>
            <div class="shelf-options" id="shelf-options">
                <!-- 动态生成 -->
            </div>
            <div class="sound-pack-selector">
                <span class="sound-pack-label">🔊 音效包</span>
                <select id="sound-pack-select" class="sound-pack-select">
                    <option value="free">🆓 基础音效包</option>
                    <option value="asmr">💎 ASMR 音效包</option>
                    <option value="mechanical">⚙️ 机械轴音效包</option>
                    <option value="nature">🌿 自然音效包</option>
                </select>
            </div>
        </div>

        <!-- 游戏区域 -->
        <main class="game-area">
            <!-- 指尖陀螺 -->
            <div id="spinner" class="toy-container active">
                <div class="spinner-wrapper">
                    <div class="spinner" id="fidget-spinner">
                        <div class="spinner-bearing"></div>
                        <div class="spinner-body">
                            <div class="spinner-arm arm-1"></div>
                            <div class="spinner-arm arm-2"></div>
                            <div class="spinner-arm arm-3"></div>
                            <div class="spinner-arm arm-4" style="display:none;"></div>
                            <div class="spinner-arm arm-5" style="display:none;"></div>
                            <div class="spinner-arm arm-6" style="display:none;"></div>
                            <div class="spinner-weight weight-1"></div>
                            <div class="spinner-weight weight-2"></div>
                            <div class="spinner-weight weight-3"></div>
                        </div>
                    </div>
                </div>
                <div class="speed-indicator" id="speed-indicator">
                    <div class="speed-bar"></div>
                    <div class="speed-bar"></div>
                    <div class="speed-bar"></div>
                    <div class="speed-bar"></div>
                    <div class="speed-bar"></div>
                </div>
                <p class="hint">点击或滑动任意位置加速 🌀</p>
            </div>

            <!-- 按压泡泡 -->
            <div id="popit" class="toy-container">
                <div class="popit-board" id="popit-board"></div>
                <div class="combo-display" id="combo-display">🔥 x0</div>
                <p class="hint">点击泡泡，听啵啵声～ 🔘</p>
                <button class="reset-btn" id="popit-reset">🔄 全部重置</button>
            </div>

            <!-- 磁力滑块 -->
            <div id="slider" class="toy-container">
                <div class="slider-wrapper">
                    <div class="slider-track" id="slider-track">
                        <div class="slider-plate slider-top" id="slider-top">
                            <div class="slider-magnets">
                                <div class="magnet"></div>
                                <div class="magnet"></div>
                                <div class="magnet"></div>
                            </div>
                        </div>
                        <div class="slider-plate slider-bottom" id="slider-bottom">
                            <div class="slider-magnets">
                                <div class="magnet"></div>
                                <div class="magnet"></div>
                                <div class="magnet"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <p class="hint">左右滑动，感受磁力咔嗒声 🔲</p>
                <div class="slider-counter">
                    <span>咔嗒次数：</span><span id="slider-clicks">0</span>
                </div>
            </div>

            <!-- 无限魔方 -->
            <div id="infinity" class="toy-container">
                <div class="infinity-wrapper">
                    <div class="infinity-cube" id="infinity-cube">
                        <div class="mini-cube cube-0"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                        <div class="mini-cube cube-1"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                        <div class="mini-cube cube-2"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                        <div class="mini-cube cube-3"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                        <div class="mini-cube cube-4"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                        <div class="mini-cube cube-5"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                        <div class="mini-cube cube-6"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                        <div class="mini-cube cube-7"><div class="face front"></div><div class="face back"></div><div class="face right"></div><div class="face left"></div><div class="face top"></div><div class="face bottom"></div></div>
                    </div>
                </div>
                <p class="hint">点击魔方任意面进行折叠 🎲</p>
                <div class="slider-counter">
                    <span>折叠次数：</span><span id="infinity-folds">0</span>
                </div>
            </div>

            <!-- 磁力捏捏球 -->
            <div id="squishy" class="toy-container">
                <div class="squishy-wrapper">
                    <div class="squishy-ball" id="squishy-ball">
                        <div class="squishy-core"></div>
                        <div class="squishy-particles" id="squishy-particles"></div>
                        <div class="squeeze-indicator">
                            <div class="squeeze-fill" id="squeeze-fill"></div>
                        </div>
                    </div>
                </div>
                <p class="hint">按住挤压，松开回弹 🔮</p>
                <div class="slider-counter">
                    <span>挤压次数：</span><span id="squishy-squeezes">0</span>
                </div>
            </div>
        </main>

        <!-- 底部 -->
        <footer class="footer">
            <p>MVP 版本 | 5 款玩具已上线</p>
            <p style="margin-top: 8px; font-size: 0.75rem; opacity: 0.7;">
                Made with ❤️ for stressed humans
            </p>
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
